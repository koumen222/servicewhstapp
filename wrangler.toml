name = "whatsapp-saas-frontend"
compatibility_date = "2024-03-07"
compatibility_flags = ["nodejs_compat"]

pages_build_output_dir = "frontend/.next"

[build]
command = "cd frontend && npm install && npm run build"
cwd = "frontend"
watch_dir = "frontend/src"

[build.environment]
NODE_VERSION = "18"
NPM_VERSION = "9"

# Environment variables
[env.production.vars]
NEXT_PUBLIC_API_URL = "https://api.ecomcookpit.site"

[env.preview.vars]
NEXT_PUBLIC_API_URL = "https://api.ecomcookpit.site"
